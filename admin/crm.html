<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>CRM | PICTS-Netzwerk Aargau Admin</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="stylesheet" href="crm.css" />
</head>
<body>
  <div id="app">
    <!-- Navigation / Header -->
    <nav class="admin-nav">
      <div class="nav-brand">
        <a href="/admin/">← Zurück zum Decap CMS</a>
      </div>
      <div class="nav-user">
        <span id="user-email"></span>
        <button id="logout-btn" class="btn-secondary">Abmelden</button>
      </div>
    </nav>

    <header class="app-header">
      <h1>Netzwerk CRM</h1>
      <p>Verwalte die eingegangenen Kontaktanfragen aus der Website</p>
    </header>

    <main class="dashboard">
      <section class="list-section">
        <div class="glass-card">
          <div class="card-header">
            <h2>Eingegangene Anfragen</h2>
            <div class="btn-group">
              <button id="add-contact-btn" class="btn-primary" style="background-color: #2ecc71;">+ Neuer Kontakt</button>
              <button id="export-btn" class="btn-primary" style="background-color: #9b59b6;">Exportieren (XLSX)</button>
              <button id="import-btn" class="btn-primary" style="background-color: #e67e22;">Importieren (XLSX)</button>
              <button id="refresh-btn" class="btn-primary">Aktualisieren</button>
            </div>
          </div>
          <input type="file" id="import-file-input" style="display: none;" accept=".xlsx, .xls" />
          <div class="contacts-container" id="contacts-container">
            <div class="loading-state">Lade Kontakte...</div>
          </div>
        </div>
      </section>
    </main>
  <!-- Edit Modal -->
  <div id="edit-modal" class="modal" style="display: none;">
    <div class="modal-content glass-card">
      <div class="modal-header">
        <h2>Kontakt bearbeiten</h2>
        <span class="close-modal-btn" id="close-modal-btn">&times;</span>
      </div>
      <form id="edit-contact-form">
        <input type="hidden" id="edit-id" name="id" />
        
        <div class="form-group">
          <label for="edit-name">Name (Vorname & Nachname)</label>
          <input type="text" id="edit-name" name="name" required />
        </div>
        
        <div class="form-group">
          <label for="edit-email">E-Mail-Adresse</label>
          <input type="email" id="edit-email" name="email" required />
        </div>

        <div class="form-group">
          <label for="edit-school">Schulgemeinde / Schule</label>
          <input type="text" id="edit-school" name="schule" />
        </div>

        <div class="form-group">
          <label for="edit-phone">Telefonnummer</label>
          <input type="tel" id="edit-phone" name="telefon" />
        </div>

        <div class="form-group">
          <label for="edit-interest">Interesse</label>
          <select id="edit-interest" name="interesse">
            <option value="">Bitte wählen …</option>
            <option value="mitmachen">Am Netzwerk teilnehmen</option>
            <option value="kernteam">Im Kernteam mitarbeiten</option>
            <option value="treffen">An Treffen teilnehmen</option>
            <option value="interesse">Interesse anmelden</option>
            <option value="infos">Informationen erhalten</option>
          </select>
        </div>

        <div class="form-group">
          <label for="edit-message">Nachricht</label>
          <textarea id="edit-message" name="nachricht" rows="3"></textarea>
        </div>

        <!-- Administrative Felder -->
        <div class="form-group">
          <label for="edit-status">Status (Administrativ)</label>
          <select id="edit-status" name="status">
            <option value="Neu">Neu</option>
            <option value="In Bearbeitung">In Bearbeitung</option>
            <option value="Mitglied">Mitglied</option>
            <option value="Inaktiv">Inaktiv</option>
          </select>
        </div>

        <div class="form-group">
          <label for="edit-notizen">Interne Notizen (Administrativ)</label>
          <textarea id="edit-notizen" name="notizen" rows="3" placeholder="Z.B. Treffen vereinbart am..."></textarea>
        </div>

        <div class="modal-footer">
          <button type="button" id="cancel-edit-btn" class="btn-secondary">Abbrechen</button>
          <button type="submit" class="btn-primary">Speichern</button>
        </div>
      </form>
    </div>
  </div>

  <script src="xlsx.full.min.js"></script>
  <script src="crm.js?v=5"></script>
</body>
</html>
